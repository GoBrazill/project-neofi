<header>
    <div class="logo-wrapper">
        <img src="/assets/icons/logo-neofi.svg" alt="">
        <p>NeoFi</p>
    </div>
    <div class="nav-header">
        <ul>
            <li><a class="is-active" href="">Home</a></li>
        </ul>
        <ul>
            <li><a href="">Features</a></li>
        </ul>
        <ul>
            <li><a href="">Testimonial</a></li>
        </ul>
        <ul>
            <li><a href="">FAQ</a></li>
        </ul>
    </div>
    <div class="btn-wrapper-alt-1">
        <button class="btn-secondary" (click)="toggleModal()">Login</button>
        <button class="btn-primary">Try For Free</button>
    </div>
</header>

<div id="modal" [class.modal-visible]="isModalOpen">
    <img src="/assets/icons/icon-close.svg" alt="" (click)="toggleModal()">
    <fieldset>
        <label class="input-container">
            <img src="/assets/icons/icon-user.svg" alt="">
            <input type="text" placeholder="Nome">
        </label>

        <label class="input-container">
            <img src="/assets/icons/icon-email.svg" alt="">
            <input type="email" placeholder="Email">
        </label>
    </fieldset>
</div>

<div id="overlay" (click)="toggleModal()" [class.modal-visible]="isModalOpen"></div>
